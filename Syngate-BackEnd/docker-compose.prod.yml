services:
  redis:
    image: redis:7-alpine
    container_name: syngate-redis
    ports:
      - "6379:6379"
    volumes:
      - syngate-redis-data:/data
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: syngate-api
    ports:
      - "3333:3333"
    environment:
      # As variáveis serão injetadas diretamente na máquina EC2 depois
      - NODE_ENV=production
      - PORT=3333
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    depends_on:
      - redis
    restart: always

volumes:
  syngate-redis-data: